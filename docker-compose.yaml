services:
  catalogue: 
    build:
      dockerfile: catalogue.Dockerfile
    image: sudhapinisetti10/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build:
      dockerfile: user.Dockerfile
    image: sudhapinisetti10/user:1.0.0
    container_name: user
    depends_on:
    - redis
  frontend: 
    build:
      dockerfile: frontend.Dockerfile
    image: sudhapinisetti10/frontend:1.0.0
    container_name: frontend
    depends_on:
    - catalogue
    - user

  mongodb:
    build:
      dockerfile: mongodb.Dockerfile
    image:  sudhapinisetti10/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop
    external: true