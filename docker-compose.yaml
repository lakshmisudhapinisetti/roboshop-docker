version: "3.8"

services:
  catalogue:
    build:
      context: ./catalogue
    image: sudhapinisetti10/catalogue:1.0.0
    depends_on:
      - mongodb
  user:
    build : ./user
    image: sudhapinisetti10/user:1.0.0
    depends_on:
      - redis
      - mongodb
  cart:
    build:
      context: ./cart
    image: sudhapinisetti10/cart:1.0.0
    depends_on:
      - redis
  shipping:
    build:
      context: ./shipping
    image: sudhapinisetti10/shipping:1.0.0
    depends_on:
      - mysql
  frontend:
    build:
      context: ./frontend
    image: sudhapinisetti10/frontend:1.0.0
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
    ports:
      - "80:80"

  mongodb:
    build:
      context: ./mongodb
    image: sudhapinisetti10/mongodb:1.0.0

  redis:
    image: redis:7.0
  mysql:
    build:
      context: ./mysql
    image: sudhapinisetti10/mysql:1.0.0
  

networks:
  default:
    driver: bridge
    name: roboshop
    external: true